# Sample workflow for building and deploying Rabbit Relay landing page + VitePress docs to GitHub Pages
#
name: Deploy Rabbit Relay site to Pages

on:
  push:
    branches: [main, release/0.10.0-production-hardening]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # - uses: pnpm/action-setup@v4
      #   with:
      #     version: 9

      # - uses: oven-sh/setup-bun@v1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm ci

      - name: Build docs with VitePress
        run: npm run docs:build

      - name: Prepare final site
        run: |
          rm -rf site-dist
          mkdir -p site-dist

          # Landing page at /rabbit-relay/
          cp index.html site-dist/index.html

          # Landing page assets at /rabbit-relay/assets/
          cp -r assets site-dist/assets

          # VitePress docs at /rabbit-relay/docs/
          mkdir -p site-dist/docs
          cp -r docs/.vitepress/dist/* site-dist/docs/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site-dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4